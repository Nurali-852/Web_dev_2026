<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Project: Event Invite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f7ff;
            text-align: center;
            padding: 30px;
        }

        .card {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h1 {
            color: #4a6ee0;
        }

        h2 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 5px;
        }

        .rsvp-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #4a6ee0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .rsvp-btn:hover {
            background-color: #3957b8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>You're Invited!</h1>
        <h2>Birthday Party Bash</h2>

        <p><strong>The details:</strong></p>
        <ul>
            <li>Date: March 15, 2026</li>
            <li>Time: 18:00 AM</li>
            <li>Location: Sunset Cafe, Almaty</li>
        </ul>

        <p><strong>Guest List:</strong></p>
        <ul>
            <li>Nurali</li>
            <li>Aruzhan</li>
            <li>Ali</li>
            <li>Dana</li>
        </ul>

        <button class="rsvp-btn">RSVP</button>
    </div>

</body>
</html>
