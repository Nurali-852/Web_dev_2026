<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: The dinner table</title>
    </head>
    <body>
    
        <h1>Our dinner menu</h1>

        <table>
            <thead>
                <tr>
                    <th>Meal</th>
                    <th>Ingredients</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mashed potatoes</td>
                    <td>Potatoes, butter, milk</td>
                    <td>$500</td>
                </tr>
                <tr>
                    <td>English breakfast</td>
                    <td>Eggs, sausages, bacon</td>
                    <td>$600</td>
                </tr>
                <tr>
                    <td>Fried chicken</td>
                    <td>Chicken, chips, oil</td>
                    <td>$1000</td>
                </tr>
            </tbody>
        </table>

    </body>
</html>
